name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SERVER_URL: ${{ secrets.NEXT_PUBLIC_SERVER_URL }}
      NEXT_PUBLIC_ASSETS_DIR: ${{ secrets.NEXT_PUBLIC_ASSETS_DIR }}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: NEXT_PUBLIC_SERVER_URL,NEXT_PUBLIC_ASSETS_DIR,NEXT_PUBLIC_GOOGLE_CLIENT_ID
          script: |
            cd /opt/mock4ielts-frontend
            {
              echo "NEXT_PUBLIC_SERVER_URL=$NEXT_PUBLIC_SERVER_URL"
              echo "NEXT_PUBLIC_ASSETS_DIR=$NEXT_PUBLIC_ASSETS_DIR"
              echo "NEXT_PUBLIC_GOOGLE_CLIENT_ID=$NEXT_PUBLIC_GOOGLE_CLIENT_ID"
            } > .env
            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f

            # Health check
            for i in 1 2 3 4 5 6; do
              sleep 5
              if curl -sf http://127.0.0.1:3000 > /dev/null; then
                echo "Health check PASSED (attempt $i)"
                exit 0
              fi
              echo "Waiting for app... (attempt $i)"
            done
            echo "Health check FAILED after 30s"
            docker compose logs --tail=20
            exit 1
