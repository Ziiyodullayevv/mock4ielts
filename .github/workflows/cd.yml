name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      LIVEKIT_URL: ${{ secrets.LIVEKIT_URL }}
      LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
      LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
      LIVEKIT_AGENT_NAME: ${{ secrets.LIVEKIT_AGENT_NAME }}
      NEXT_PUBLIC_LIVEKIT_URL: ${{ secrets.NEXT_PUBLIC_LIVEKIT_URL }}
      NEXT_PUBLIC_SERVER_URL: ${{ secrets.NEXT_PUBLIC_SERVER_URL }}
      NEXT_PUBLIC_ASSETS_DIR: ${{ secrets.NEXT_PUBLIC_ASSETS_DIR }}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
      NEXT_PUBLIC_SPEAKING_USE_LOCAL_TOKEN_ROUTE: ${{ secrets.NEXT_PUBLIC_SPEAKING_USE_LOCAL_TOKEN_ROUTE }}
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST || secrets.SSH_HOST }}
          username: ${{ secrets.VPS_USER || secrets.SSH_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY || secrets.SSH_PRIVATE_KEY }}
          envs: LIVEKIT_URL,LIVEKIT_API_KEY,LIVEKIT_API_SECRET,LIVEKIT_AGENT_NAME,NEXT_PUBLIC_LIVEKIT_URL,NEXT_PUBLIC_SERVER_URL,NEXT_PUBLIC_ASSETS_DIR,NEXT_PUBLIC_GOOGLE_CLIENT_ID,NEXT_PUBLIC_SPEAKING_USE_LOCAL_TOKEN_ROUTE
          script: |
            cd /opt/mock4ielts-frontend
            {
              echo "LIVEKIT_URL=$LIVEKIT_URL"
              echo "LIVEKIT_API_KEY=$LIVEKIT_API_KEY"
              echo "LIVEKIT_API_SECRET=$LIVEKIT_API_SECRET"
              echo "LIVEKIT_AGENT_NAME=$LIVEKIT_AGENT_NAME"
              echo "NEXT_PUBLIC_LIVEKIT_URL=$NEXT_PUBLIC_LIVEKIT_URL"
              echo "NEXT_PUBLIC_SERVER_URL=$NEXT_PUBLIC_SERVER_URL"
              echo "NEXT_PUBLIC_ASSETS_DIR=$NEXT_PUBLIC_ASSETS_DIR"
              echo "NEXT_PUBLIC_GOOGLE_CLIENT_ID=$NEXT_PUBLIC_GOOGLE_CLIENT_ID"
              echo "NEXT_PUBLIC_SPEAKING_USE_LOCAL_TOKEN_ROUTE=$NEXT_PUBLIC_SPEAKING_USE_LOCAL_TOKEN_ROUTE"
            } > .env
            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f

            # Health check
            for i in 1 2 3 4 5 6; do
              sleep 5
              if curl -sf http://127.0.0.1:3000 > /dev/null; then
                echo "Health check PASSED (attempt $i)"
                exit 0
              fi
              echo "Waiting for app... (attempt $i)"
            done
            echo "Health check FAILED after 30s"
            docker compose logs --tail=20
            exit 1
