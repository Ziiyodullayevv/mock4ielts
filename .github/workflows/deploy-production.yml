name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy to Server
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_SERVER_URL: ${{ secrets.NEXT_PUBLIC_SERVER_URL }}
      NEXT_PUBLIC_ASSETS_DIR: ${{ secrets.NEXT_PUBLIC_ASSETS_DIR }}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST || secrets.SSH_HOST || secrets.VPS_HOST || vars.DEPLOY_HOST || vars.SSH_HOST || vars.VPS_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || vars.DEPLOY_PORT || vars.SSH_PORT || vars.VPS_PORT || '22' }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER || secrets.SSH_USERNAME || secrets.VPS_USER || vars.DEPLOY_USER || vars.SSH_USERNAME || vars.VPS_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY || secrets.SSH_PRIVATE_KEY || secrets.VPS_SSH_KEY }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || vars.DEPLOY_PATH }}
      DEPLOY_RESTART_COMMAND: ${{ secrets.DEPLOY_RESTART_COMMAND || vars.DEPLOY_RESTART_COMMAND }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate required secrets
        shell: bash
        run: |
          missing=0

          if [ -z "$NEXT_PUBLIC_SERVER_URL" ]; then
            echo "::error::Missing NEXT_PUBLIC_SERVER_URL"
            missing=1
          fi

          if [ -z "$NEXT_PUBLIC_GOOGLE_CLIENT_ID" ]; then
            echo "::error::Missing NEXT_PUBLIC_GOOGLE_CLIENT_ID"
            missing=1
          fi

          if [ -z "$DEPLOY_HOST" ]; then
            echo "::error::Missing deploy host. Supported names: DEPLOY_HOST, SSH_HOST, VPS_HOST"
            missing=1
          fi

          if [ -z "$DEPLOY_USER" ]; then
            echo "::error::Missing deploy user. Supported names: DEPLOY_USER, SSH_USERNAME, VPS_USER"
            missing=1
          fi

          if [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "::error::Missing SSH private key. Supported names: DEPLOY_SSH_KEY, SSH_PRIVATE_KEY, VPS_SSH_KEY"
            missing=1
          fi

          if [ -z "$DEPLOY_PATH" ]; then
            echo "::error::Missing DEPLOY_PATH. Add it as a GitHub Secret or Variable"
            missing=1
          fi

          if [ -z "$DEPLOY_RESTART_COMMAND" ]; then
            echo "::error::Missing DEPLOY_RESTART_COMMAND. Add it as a GitHub Secret or Variable"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Write production env file
        shell: bash
        run: |
          {
            echo "NEXT_PUBLIC_SERVER_URL=$NEXT_PUBLIC_SERVER_URL"
            echo "NEXT_PUBLIC_ASSETS_DIR=$NEXT_PUBLIC_ASSETS_DIR"
            echo "NEXT_PUBLIC_GOOGLE_CLIENT_ID=$NEXT_PUBLIC_GOOGLE_CLIENT_ID"
          } > .env.production

      - name: Build app
        run: npm run build

      - name: Package release
        run: tar -czf release.tgz .next/standalone .next/static public .env.production

      - name: Setup SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload release to server
        run: scp -P "${DEPLOY_PORT:-22}" release.tgz "$DEPLOY_USER@$DEPLOY_HOST:/tmp/mock4ielts-release.tgz"

      - name: Activate release on server
        shell: bash
        run: |
          RESTART_COMMAND_B64="$(printf '%s' "$DEPLOY_RESTART_COMMAND" | base64 -w 0)"

          ssh -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" "
            set -e
            APP_DIR='$DEPLOY_PATH'
            RELEASE_DIR=\"\$APP_DIR/releases/${GITHUB_SHA}\"

            mkdir -p \"\$APP_DIR/releases\"
            mkdir -p \"\$RELEASE_DIR\"
            tar -xzf /tmp/mock4ielts-release.tgz -C \"\$RELEASE_DIR\"
            ln -sfn \"\$RELEASE_DIR\" \"\$APP_DIR/current\"
            cd \"\$APP_DIR/current\"
            printf '%s' '$RESTART_COMMAND_B64' | base64 -d | bash
          "
