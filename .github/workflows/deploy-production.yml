name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy to Server
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_SERVER_URL: ${{ secrets.NEXT_PUBLIC_SERVER_URL }}
      NEXT_PUBLIC_ASSETS_DIR: ${{ secrets.NEXT_PUBLIC_ASSETS_DIR }}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_RESTART_COMMAND: ${{ secrets.DEPLOY_RESTART_COMMAND }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate required secrets
        shell: bash
        run: |
          missing=0

          for name in NEXT_PUBLIC_SERVER_URL NEXT_PUBLIC_GOOGLE_CLIENT_ID DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_PATH DEPLOY_RESTART_COMMAND; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required secret: $name"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Write production env file
        shell: bash
        run: |
          {
            echo "NEXT_PUBLIC_SERVER_URL=$NEXT_PUBLIC_SERVER_URL"
            echo "NEXT_PUBLIC_ASSETS_DIR=$NEXT_PUBLIC_ASSETS_DIR"
            echo "NEXT_PUBLIC_GOOGLE_CLIENT_ID=$NEXT_PUBLIC_GOOGLE_CLIENT_ID"
          } > .env.production

      - name: Build app
        run: npm run build

      - name: Package release
        run: tar -czf release.tgz .next/standalone .next/static public .env.production

      - name: Setup SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload release to server
        run: scp -P "${DEPLOY_PORT:-22}" release.tgz "$DEPLOY_USER@$DEPLOY_HOST:/tmp/mock4ielts-release.tgz"

      - name: Activate release on server
        shell: bash
        run: |
          RESTART_COMMAND_B64="$(printf '%s' "$DEPLOY_RESTART_COMMAND" | base64 -w 0)"

          ssh -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" "
            set -e
            APP_DIR='$DEPLOY_PATH'
            RELEASE_DIR=\"\$APP_DIR/releases/${GITHUB_SHA}\"

            mkdir -p \"\$APP_DIR/releases\"
            mkdir -p \"\$RELEASE_DIR\"
            tar -xzf /tmp/mock4ielts-release.tgz -C \"\$RELEASE_DIR\"
            ln -sfn \"\$RELEASE_DIR\" \"\$APP_DIR/current\"
            cd \"\$APP_DIR/current\"
            printf '%s' '$RESTART_COMMAND_B64' | base64 -d | bash
          "
