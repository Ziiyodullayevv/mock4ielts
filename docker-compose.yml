services:
  app:
    image: ghcr.io/ziiyodullayevv/mock4ielts:latest
    container_name: mock4ielts
    restart: unless-stopped
    ports:
      - '127.0.0.1:8083:8083'
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 8083
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8083']
      interval: 30s
      timeout: 5s
      retries: 3
